<title>Cartes de visite — Impression</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --gold-1: #f4dca0;
    --gold-2: #d4af5f;
    --gold-3: #a87f31;
    --gold-deep: #6e5318;
    --ink: #0a0a0a;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #e8e6e1;
    font-family: 'Inter', system-ui, sans-serif;
    color: #1a1a1a;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  /* On-screen layout */
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 16px auto;
    background: #fff;
    padding: 24mm 20mm;
    box-sizing: border-box;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    page-break-after: always;
    break-after: page;
  }
  .page:last-child { page-break-after: auto; break-after: auto; }

  .page-title {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 9pt;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #888;
    margin: 0 0 16mm;
    text-align: center;
  }

  /* Card real-size: 85 × 55 mm → at 96dpi => 321.26 × 207.87 px */
  /* We render the React card at its design size (510 × 330 px) and scale it to 85×55mm via transform */
  .card-frame {
    width: 85mm;
    height: 55mm;
    position: relative;
    overflow: visible;
    margin-bottom: 14mm;
  }
  .card-frame .scale-wrap {
    width: 510px;
    height: 330px;
    transform: scale(calc(85 / 25.4 * 96 / 510));
    transform-origin: top left;
    position: absolute;
    top: 0; left: 0;
  }
  /* Crop marks */
  .card-frame::before, .card-frame::after,
  .card-frame > .cm-tl, .card-frame > .cm-tr, .card-frame > .cm-bl, .card-frame > .cm-br {
    content: "";
    position: absolute;
    width: 4mm; height: 4mm;
    pointer-events: none;
  }
  .card-frame > .cm-tl { top: -6mm; left: -6mm; border-left: 0.5pt solid #999; border-top: 0.5pt solid #999; }
  .card-frame > .cm-tr { top: -6mm; right: -6mm; border-right: 0.5pt solid #999; border-top: 0.5pt solid #999; }
  .card-frame > .cm-bl { bottom: -6mm; left: -6mm; border-left: 0.5pt solid #999; border-bottom: 0.5pt solid #999; }
  .card-frame > .cm-br { bottom: -6mm; right: -6mm; border-right: 0.5pt solid #999; border-bottom: 0.5pt solid #999; }

  .card-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .var-label {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 8.5pt;
    color: #555;
    margin-bottom: 8mm;
    letter-spacing: .04em;
  }
  .size-label {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 7.5pt;
    color: #999;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 2mm;
  }

  /* Card styles — copied from main file */
  .card {
    width: 510px; height: 330px;
    position: relative;
    overflow: hidden;
    color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .card.paper { color: #1a1a1a; }
  .card .bleed { position:absolute; inset:0; }
  .gold-text {
    background: linear-gradient(135deg, #f4dca0 0%, #d4af5f 35%, #b8923f 60%, #e9c97a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .gold-flat { color: #c9a24a; }
  .hairline-gold { background: linear-gradient(90deg, transparent, #d4af5f, transparent); height:1px; }
  .grain::after {
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.18; mix-blend-mode:overlay;
    background-image: radial-gradient(rgba(255,255,255,.4) 1px, transparent 1px), radial-gradient(rgba(0,0,0,.4) 1px, transparent 1px);
    background-size: 3px 3px, 4px 4px;
    background-position: 0 0, 1px 1px;
  }

  /* Specs page */
  .specs-page {
    padding: 28mm 24mm;
  }
  .specs-page h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 28pt;
    margin: 0 0 14mm;
    color: #0a0a0a;
  }
  .specs-page h2 {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 9pt;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #888;
    margin: 8mm 0 3mm;
  }
  .specs-page p, .specs-page li {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11pt;
    line-height: 1.7;
    color: #1a1a1a;
    margin: 0 0 4mm;
  }
  .specs-page ul { padding-left: 6mm; margin: 0 0 6mm; }
  .specs-page strong { color: #0a0a0a; font-weight: 600; }

  @media print {
    html, body { background: #fff; }
    .page {
      margin: 0;
      box-shadow: none;
      padding: 24mm 20mm;
      page-break-after: always;
      break-after: page;
    }
    .page:last-child { page-break-after: auto; break-after: auto; }
    @page { size: A4 portrait; margin: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const LOGO = 'assets/logo-v4-clean.png';

const LogoFull = ({ width, opacity = 1, style = {} }) =>
  <img src={LOGO} alt="Latitude Organisation"
       style={{ width, height: 'auto', display: 'block', opacity, ...style }} />;

const LogoMark = ({ size = 60, opacity = 1 }) => {
  const imgW = size * 2.7;
  const imgH = imgW / 2.459;
  return (
    <div style={{ width: size, height: size, overflow: 'hidden', position: 'relative', opacity }}>
      <img src={LOGO} alt=""
           style={{ width: imgW, height: imgH, position: 'absolute',
                    left: 0, top: (size - imgH) / 2, display: 'block' }} />
    </div>
  );
};

const Icon = ({ name, size = 12, color = '#d4af5f' }) => {
  const props = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 1.6, strokeLinecap: 'round', strokeLinejoin: 'round' };
  if (name === 'phone') return <svg {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.86 19.86 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72a2 2 0 0 1 1.72 2.01z"/></svg>;
  if (name === 'mail') return <svg {...props}><rect x="2" y="4" width="20" height="16" rx="2" /><path d="m22 6-10 7L2 6" /></svg>;
  if (name === 'web') return <svg {...props}><circle cx="12" cy="12" r="10" /><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20" /></svg>;
  return null;
};

const SPECIALTIES = ['Team Building', 'Séminaires & Incentives', 'Soirées Événementielles'];

const SpecialtiesStrip = ({ size = 7.5, color = 'rgba(255,255,255,.85)', dotColor = '#d4af5f', weight = 400, spacing = '.28em', uppercase = true, gap = 10, style = {} }) =>
  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap, fontFamily:'Montserrat', fontSize:size, fontWeight:weight, letterSpacing:spacing, color, textTransform: uppercase ? 'uppercase' : 'none', ...style }}>
    {SPECIALTIES.map((s, i) =>
      <React.Fragment key={i}>
        <span>{s}</span>
        {i < SPECIALTIES.length - 1 && <span style={{ color:dotColor, fontSize: size * 1.4, lineHeight:0, transform:'translateY(-1px)' }}>•</span>}
      </React.Fragment>
    )}
  </div>;

/* V1 */
const V1 = () =>
<div className="card grain" style={{ background: 'radial-gradient(ellipse at 50% 35%, #1a1814 0%, #0a0a0a 80%)' }}>
  <div className="bleed" style={{ display: 'flex', flexDirection: 'column', padding: '30px 38px 26px', justifyContent: 'space-between' }}>
    <div style={{ display: 'flex', justifyContent: 'center' }}>
      <LogoFull width={270}/>
    </div>
    <SpecialtiesStrip size={7} color="rgba(255,255,255,.78)" gap={9}/>
    <div style={{ width: '100%' }} className="hairline-gold"/>
    <div>
      <div style={{ marginBottom: 14 }}>
        <div className="gold-text" style={{ fontFamily: 'Cormorant Garamond', fontWeight: 500, fontSize: 26, lineHeight: 1, whiteSpace:'nowrap' }}>
          Jérôme Aviotte
        </div>
        <div style={{ color: 'rgba(255,255,255,.6)', fontFamily: 'Montserrat', fontWeight: 300, fontSize: 9.5, letterSpacing: '.34em', marginTop: 6 }}>
          GÉRANT
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 18px', fontFamily: 'Inter', fontSize: 10, color: '#fff', fontWeight: 300 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="phone" size={11} /><span>06 86 70 65 20</span></div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="web" size={11} /><span>latitude-organisation.com</span></div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, gridColumn: '1 / -1' }}><Icon name="mail" size={11} /><span>jerome@latitude-organisation.com</span></div>
      </div>
    </div>
  </div>
</div>;

/* V2 */
const V2 = () =>
<div className="card grain" style={{ background: '#0a0a0a', display: 'flex' }}>
  <div style={{ width: 200, position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', borderRight: '1px solid rgba(212,175,95,.18)' }}>
    <LogoMark size={140}/>
  </div>
  <div style={{ flex: 1, padding: '28px 30px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
    <div>
      <div className="gold-text" style={{ fontFamily: 'Montserrat', fontWeight: 700, fontSize: 18, letterSpacing: '.18em', lineHeight: 1 }}>LATITUDE</div>
      <div style={{ color: '#fff', fontFamily: 'Montserrat', fontWeight: 300, fontSize: 9, letterSpacing: '.42em', marginTop: 5 }}>ORGANISATION</div>
      <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:3, fontFamily:'Montserrat', fontSize:7, letterSpacing:'.22em', color:'rgba(212,175,95,.85)', textTransform:'uppercase', fontWeight:500 }}>
        {SPECIALTIES.map((s, i) => <span key={i}>— {s}</span>)}
      </div>
    </div>
    <div>
      <div style={{ fontFamily: 'Cormorant Garamond', fontWeight: 500, fontSize: 24, color: '#fff', lineHeight: 1 }}>Jérôme Aviotte</div>
      <div className="gold-flat" style={{ fontFamily: 'Montserrat', fontWeight: 400, fontSize: 9, letterSpacing: '.32em', marginTop: 5 }}>GÉRANT</div>
    </div>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5, fontFamily: 'Inter', fontSize: 9.5, color: 'rgba(255,255,255,.85)', fontWeight: 300 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}><Icon name="phone" size={10}/><span>06 86 70 65 20</span></div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}><Icon name="mail" size={10}/><span>jerome@latitude-organisation.com</span></div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}><Icon name="web" size={10}/><span>www.latitude-organisation.com</span></div>
    </div>
  </div>
</div>;

/* V3 */
const V3 = () =>
<div className="card" style={{ background: '#080808' }}>
  <div className="bleed" style={{ padding: '26px 36px 24px', display: 'flex', flexDirection: 'column' }}>
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: -2 }}>
      <LogoFull width={360}/>
    </div>
    <SpecialtiesStrip size={7} color="rgba(255,255,255,.78)" gap={9} style={{ marginTop:6 }}/>
    <div style={{ height: 1, background: 'linear-gradient(90deg, transparent, #d4af5f, transparent)', margin: '10px 0 12px' }}/>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: 'Inter', fontSize: 9.5, color: 'rgba(255,255,255,.85)', fontWeight: 300 }}>
      <div>
        <div className="gold-flat" style={{ fontFamily: 'Cormorant Garamond', fontWeight: 500, fontSize: 17, color: '#e9c97a', lineHeight: 1, whiteSpace:'nowrap' }}>Jérôme Aviotte</div>
        <div style={{ color: 'rgba(255,255,255,.5)', fontSize: 8, letterSpacing: '.34em', marginTop: 3, fontFamily: 'Montserrat' }}>GÉRANT</div>
      </div>
      <div style={{ textAlign: 'right', display: 'flex', flexDirection: 'column', gap: 2 }}>
        <span>06 86 70 65 20</span>
        <span>jerome@latitude-organisation.com</span>
        <span style={{ color: '#d4af5f' }}>latitude-organisation.com</span>
      </div>
    </div>
  </div>
</div>;

/* V4 */

// Auto-print after fonts and content are ready
(async () => {
  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }
  } catch(e) {}
  // Wait for images to load
  const imgs = Array.from(document.querySelectorAll('img'));
  await Promise.all(imgs.map(img => img.complete ? Promise.resolve() : new Promise(r => { img.onload = img.onerror = r; })));
  setTimeout(() => { window.print(); }, 600);
})();
